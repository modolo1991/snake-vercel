<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Snake</title>
  <meta name="theme-color" content="#08111f" />
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(15, 23, 42, 0.9);
      --panel-2: rgba(30, 41, 59, 0.92);
      --line: rgba(255,255,255,0.08);
      --text: #e5eefc;
      --muted: #9fb1cc;
      --accent: #38bdf8;
      --accent-2: #2563eb;
      --snake: #34d399;
      --head: #10b981;
      --food: #fb7185;
      --danger: #f97316;
      --shadow: 0 24px 70px rgba(0,0,0,0.34);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.14), transparent 35%),
        linear-gradient(180deg, #09111d 0%, #0b1323 100%);
      display: grid;
      place-items: center;
      padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom)) 14px;
      overscroll-behavior: none;
      touch-action: manipulation;
      user-select: none;
    }

    .app {
      width: min(100%, 560px);
      background: linear-gradient(180deg, rgba(15,23,42,0.94), rgba(9,15,28,0.96));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      line-height: 1;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(84px, 1fr));
      gap: 8px;
      min-width: 180px;
    }

    .card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      text-align: center;
    }

    .card .label {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card .value {
      display: block;
      margin-top: 4px;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .board-shell {
      position: relative;
      background: #050b16;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #09111d;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(2, 6, 23, 0.38);
      backdrop-filter: blur(4px);
      transition: opacity 0.2s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .message {
      width: min(100%, 320px);
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 12px 36px rgba(0,0,0,0.32);
    }

    .message h2 {
      margin: 0 0 8px;
      font-size: 1.3rem;
    }

    .message p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.96rem;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 700;
      font-size: 0.98rem;
      cursor: pointer;
      color: white;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
    }

    button.secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .below {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .help {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .touchpad {
      display: grid;
      justify-content: center;
      gap: 8px;
      margin-top: 2px;
    }

    .touch-row {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .dir {
      width: 72px;
      height: 56px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 1.4rem;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: none;
      -webkit-tap-highlight-color: transparent;
    }

    .dir:active, button:active {
      transform: scale(0.98);
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      font-size: 0.84rem;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 999px;
      padding: 7px 10px;
    }

    @media (max-width: 520px) {
      .topbar {
        flex-direction: column;
      }
      .stats {
        width: 100%;
      }
      .dir {
        width: 78px;
        height: 58px;
      }
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="title">
        <h1>Snake</h1>
        <div class="subtitle">Built for phones. Swipe or tap the controls.</div>
      </div>
      <div class="stats">
        <div class="card">
          <span class="label">Score</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="card">
          <span class="label">Best</span>
          <span class="value" id="best">0</span>
        </div>
      </div>
    </div>

    <section class="board-shell">
      <canvas id="game" width="600" height="600" aria-label="Snake game board"></canvas>
      <div class="overlay" id="overlay">
        <div class="message">
          <h2 id="messageTitle">Ready?</h2>
          <p id="messageText">Tap Play, press space, or swipe to start.</p>
        </div>
      </div>
    </section>

    <div class="below">
      <div class="status-row">
        <div class="meta">
          <div class="pill" id="speedPill">Speed: 8.0 tiles/sec</div>
          <div class="pill" id="statePill">State: waiting</div>
        </div>
        <div class="actions">
          <button id="playPauseBtn">Play</button>
          <button class="secondary" id="restartBtn">Restart</button>
        </div>
      </div>

      <div class="touchpad" aria-label="Touch controls">
        <div class="touch-row"><button class="dir" data-dir="up" aria-label="Up">▲</button></div>
        <div class="touch-row">
          <button class="dir" data-dir="left" aria-label="Left">◀</button>
          <button class="dir" data-dir="down" aria-label="Down">▼</button>
          <button class="dir" data-dir="right" aria-label="Right">▶</button>
        </div>
      </div>

      <div class="help">
        Phone: swipe anywhere on the board or use the buttons. Keyboard: arrows / WASD, space to pause.
      </div>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const speedPill = document.getElementById('speedPill');
    const statePill = document.getElementById('statePill');
    const overlay = document.getElementById('overlay');
    const messageTitle = document.getElementById('messageTitle');
    const messageText = document.getElementById('messageText');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const restartBtn = document.getElementById('restartBtn');

    const GRID_COUNT = 20;
    const CELL = canvas.width / GRID_COUNT;
    const BASE_SPEED = 8;
    const SPEED_STEP = 0.35;
    const TICK_CAP = 16;

    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = { x: 0, y: 0 };
    let score = 0;
    let best = Number(localStorage.getItem('snake-best') || 0);
    let running = false;
    let gameOver = false;
    let started = false;
    let lastTime = 0;
    let stepAccumulator = 0;
    let touchStart = null;

    bestEl.textContent = best;

    function getSpeed() {
      return Math.min(BASE_SPEED + score * SPEED_STEP, TICK_CAP);
    }

    function setOverlay(title, text, visible = true) {
      messageTitle.textContent = title;
      messageText.textContent = text;
      overlay.classList.toggle('hidden', !visible);
    }

    function updateUi() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
      speedPill.textContent = `Speed: ${getSpeed().toFixed(1)} tiles/sec`;
      let state = 'waiting';
      if (gameOver) state = 'game over';
      else if (running) state = 'running';
      else if (started) state = 'paused';
      statePill.textContent = `State: ${state}`;
      playPauseBtn.textContent = gameOver ? 'Play again' : (running ? 'Pause' : 'Play');
    }

    function randomFreeCell() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * GRID_COUNT),
          y: Math.floor(Math.random() * GRID_COUNT)
        };
      } while (snake.some(seg => seg.x === pos.x && seg.y === pos.y));
      return pos;
    }

    function resetGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      food = randomFreeCell();
      score = 0;
      running = false;
      gameOver = false;
      started = false;
      lastTime = 0;
      stepAccumulator = 0;
      setOverlay('Ready?', 'Tap Play, press space, or swipe to start.', true);
      updateUi();
      draw();
    }

    function startGame() {
      if (gameOver) {
        resetGame();
      }
      started = true;
      running = true;
      setOverlay('', '', false);
      updateUi();
    }

    function pauseGame() {
      if (!started || gameOver) return;
      running = false;
      setOverlay('Paused', 'Tap Play or press space to keep going.', true);
      updateUi();
    }

    function togglePlayPause() {
      if (!started || gameOver) {
        startGame();
      } else if (running) {
        pauseGame();
      } else {
        startGame();
      }
    }

    function setDirection(x, y) {
      if (x === -direction.x && y === -direction.y) return;
      nextDirection = { x, y };
      if (!started || gameOver) {
        startGame();
      }
    }

    function endGame() {
      running = false;
      gameOver = true;
      setOverlay('Game over', `Score ${score}. Tap Play again, Restart, or press space.`, true);
      updateUi();
    }

    function step() {
      direction = nextDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const hitWall = head.x < 0 || head.y < 0 || head.x >= GRID_COUNT || head.y >= GRID_COUNT;
      const hitSelf = snake.some(seg => seg.x === head.x && seg.y === head.y);
      if (hitWall || hitSelf) {
        endGame();
        draw();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 1;
        if (score > best) {
          best = score;
          localStorage.setItem('snake-best', String(best));
        }
        food = randomFreeCell();
      } else {
        snake.pop();
      }

      updateUi();
      draw();
    }

    function drawRoundedRect(x, y, w, h, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.fill();
    }

    function drawBoard() {
      for (let y = 0; y < GRID_COUNT; y++) {
        for (let x = 0; x < GRID_COUNT; x++) {
          ctx.fillStyle = (x + y) % 2 === 0 ? '#0b1629' : '#0d1b31';
          ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
        }
      }
    }

    function drawFood() {
      const cx = food.x * CELL + CELL / 2;
      const cy = food.y * CELL + CELL / 2;
      ctx.fillStyle = 'rgba(251, 113, 133, 0.18)';
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.38, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#fb7185';
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.23, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#ffd7df';
      ctx.beginPath();
      ctx.arc(cx - CELL * 0.07, cy - CELL * 0.07, CELL * 0.05, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSnake() {
      snake.forEach((seg, index) => {
        const x = seg.x * CELL + 2;
        const y = seg.y * CELL + 2;
        const size = CELL - 4;
        drawRoundedRect(x, y, size, size, 7, index === 0 ? '#10b981' : '#34d399');

        if (index === 0) {
          const eyeOffsetX = direction.x === 0 ? CELL * 0.15 : direction.x * CELL * 0.12;
          const eyeOffsetY = direction.y === 0 ? CELL * 0.15 : direction.y * CELL * 0.12;
          const baseX = seg.x * CELL + CELL / 2;
          const baseY = seg.y * CELL + CELL / 2;
          ctx.fillStyle = '#06281d';
          ctx.beginPath();
          ctx.arc(baseX - 5 + eyeOffsetX, baseY - 5 + eyeOffsetY, 2.3, 0, Math.PI * 2);
          ctx.arc(baseX + 5 + eyeOffsetX, baseY - 5 + eyeOffsetY, 2.3, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBoard();
      drawFood();
      drawSnake();
    }

    function loop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const delta = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      if (running) {
        stepAccumulator += delta;
        const interval = 1 / getSpeed();
        while (stepAccumulator >= interval) {
          stepAccumulator -= interval;
          if (!running) break;
          step();
        }
      }

      requestAnimationFrame(loop);
    }

    function handleKey(event) {
      const key = event.key.toLowerCase();
      if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d", " "].includes(key)) {
        event.preventDefault();
      }

      if (key === 'arrowup' || key === 'w') setDirection(0, -1);
      else if (key === 'arrowdown' || key === 's') setDirection(0, 1);
      else if (key === 'arrowleft' || key === 'a') setDirection(-1, 0);
      else if (key === 'arrowright' || key === 'd') setDirection(1, 0);
      else if (key === ' ') togglePlayPause();
    }

    function handleSwipe(startX, startY, endX, endY) {
      const dx = endX - startX;
      const dy = endY - startY;
      const threshold = 24;
      if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? 1 : -1, 0);
      } else {
        setDirection(0, dy > 0 ? 1 : -1);
      }
    }

    canvas.addEventListener('pointerdown', (event) => {
      touchStart = { x: event.clientX, y: event.clientY };
    });

    canvas.addEventListener('pointerup', (event) => {
      if (!touchStart) return;
      handleSwipe(touchStart.x, touchStart.y, event.clientX, event.clientY);
      touchStart = null;
    });

    document.querySelectorAll('[data-dir]').forEach((button) => {
      button.addEventListener('click', () => {
        const dir = button.dataset.dir;
        if (dir === 'up') setDirection(0, -1);
        if (dir === 'down') setDirection(0, 1);
        if (dir === 'left') setDirection(-1, 0);
        if (dir === 'right') setDirection(1, 0);
      });
    });

    playPauseBtn.addEventListener('click', togglePlayPause);
    restartBtn.addEventListener('click', () => {
      resetGame();
      startGame();
    });

    window.addEventListener('keydown', handleKey, { passive: false });

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
